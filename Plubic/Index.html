<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Dữ Liệu Database</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 20px; 
            background: #f0f2f5; 
            margin: 0; 
        }
        .container { 
            max-width: 500px; 
            margin: 40px auto; 
            background: white; 
            padding: 24px; 
            border-radius: 16px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.05); 
        }
        h2 { 
            text-align: center; 
            color: #00684a; 
            margin-top: 0;
            font-size: 24px;
        }
        .form-group { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 24px; 
        }
        input { 
            flex: 1; 
            padding: 12px 16px; 
            border: 1px solid #ced4da; 
            border-radius: 8px; 
            outline: none; 
            font-size: 14px;
            transition: border 0.2s;
        }
        input:focus {
            border-color: #00ea60;
        }
        button { 
            padding: 12px 24px; 
            background: #00ed64; 
            border: none; 
            border-radius: 8px; 
            color: #001e2b; 
            font-weight: bold; 
            font-size: 14px;
            cursor: pointer; 
        }
        button:active {
            background: #00c653;
        }
        .data-card { 
            background: #f8f9fa; 
            padding: 16px; 
            border-radius: 8px; 
            margin-bottom: 12px; 
            border-left: 5px solid #00ed64; 
        }
        .data-title { 
            font-weight: bold; 
            font-size: 15px; 
            color: #212529; 
            margin-bottom: 6px;
        }
        .data-time {
            color: #adb5bd;
            font-size: 11px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Dữ Liệu Database</h2>

    <form id="dataForm" class="form-group">
        <input type="text" id="tieuDeInput" placeholder="Nhập một tên/tiêu đề..." required>
        <button type="submit">Thêm</button>
    </form>

    <div id="dataList">
        <p style="text-align:center; color:#6c757d;">Đang tải dữ liệu...</p>
    </div>
</div>

<script>
    // 1. HÀM LẤY THÔNG TIN TỪ DATABASE
    async function fetchData() {
        try {
            // Vercel tự hiểu đường dẫn rút gọn này trỏ thẳng vào api/server.js
            const response = await fetch('/api/data');
            const data = await response.json();
            
            const dataList = document.getElementById('dataList');
            dataList.innerHTML = ''; // Xóa dòng chữ "Đang tải dữ liệu..."
            
            if (data.length === 0) {
                dataList.innerHTML = '<p style="text-align:center; color:#6c757d;">Database đang trống, hãy thêm gì đó!</p>';
                return;
            }

            // Duyệt qua mảng dữ liệu lấy về và vẽ ra màn hình
            data.forEach(item => {
                // Định dạng lại thời gian cho dễ nhìn
                const timeStr = item.createdAt ? new Date(item.createdAt).toLocaleString('vi-VN') : 'Không rõ thời gian';
                
                dataList.innerHTML += `
                    <div class="data-card">
                        <div class="data-title">📌 ${item.tieu_de || 'Trống'}</div>
                        <div class="data-time">🕒 Thêm lúc: ${timeStr}</div>
                    </div>
                `;
            });
        } catch (error) {
            console.error("Lỗi lấy dữ liệu:", error);
            document.getElementById('dataList').innerHTML = '<p style="text-align:center; color:#dc3545;">Lỗi kết nối tới máy chủ!</p>';
        }
    }

    // 2. HÀM GỬI THÔNG TIN LÊN DATABASE
    document.getElementById('dataForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const tieuDe = document.getElementById('tieuDeInput').value;
        
        try {
            await fetch('/api/data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tieu_de: tieuDe })
            });

            document.getElementById('tieuDeInput').value = ''; // Xóa chữ trong ô nhập sau khi thêm
            fetchData(); // Gọi lại hàm lấy dữ liệu để cập nhật danh sách mới ngay lập tức
        } catch (error) {
            console.error("Lỗi gửi dữ liệu:", error);
            alert("Không thể thêm dữ liệu!");
        }
    });

    // Tự động chạy hàm lấy thông tin ngay khi bạn vừa mở trang web lên
    fetchData();
</script>

</body>
</html>
